<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp 链接跳转中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1rem;
            opacity: 0.85;
        }

        .link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.75;
        }

        .link a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>正在获取 WhatsApp 链接</h1>
        <p>请稍候，即将为您跳转...</p>
        <div class="link">
            如果未自动跳转，请<a href="https://wa.me/4564123" id="manual-link">点击这里</a>
        </div>
    </div>

    <script>
        // 1秒后自动跳转
        setTimeout(function () {
            window.location.href = 'https://wa.me/4564123';
        }, 3000);
    </script>
</body>
</html>
